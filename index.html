<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Maker PRO - KL ESPORTS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --p-orange: #ff4d00; --bg: #0f172a; --card-bg: #1e293b; --p-green: #22c55e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; padding: 20px; margin: 0; }
        .header { font-size: 24px; font-weight: 900; color: var(--p-orange); text-align: center; margin-bottom: 20px; }
        
        /* Date Filter Style */
        .filter-container { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; border: 1px solid #334155; }
        .filter-container label { font-size: 14px; font-weight: bold; color: #94a3b8; }
        .date-picker { padding: 8px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid var(--p-orange); outline: none; font-weight: bold; }

        .match-card {
            background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 15px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border: 1px solid #334155;
        }
        .m-title { font-weight: bold; font-size: 18px; margin-bottom: 5px; color: #f8fafc; }
        .m-time-info { font-size: 12px; color: var(--p-orange); margin-bottom: 10px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        
        .m-stats { font-size: 14px; color: #94a3b8; display: flex; justify-content: space-between; margin-bottom: 20px; }
        
        .controls { display: flex; gap: 10px; }
        input[type="number"] { 
            flex: 1; padding: 14px; border: 1px solid #334155; border-radius: 12px; 
            background: #0f172a; color: white; font-weight: bold; text-align: center; font-size: 16px;
        }
        .btn-add { 
            background: var(--p-green); color: white; border: none; 
            padding: 14px 25px; border-radius: 12px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header"><i class="fa-solid fa-robot"></i> DEMO MAKER PRO</div>

<div class="filter-container">
    <label><i class="fa fa-calendar-day"></i> Filter Date:</label>
    <input type="date" id="demoDateFilter" class="date-picker" onchange="loadMatches()">
</div>

<div id="demoMatchList">
    <p style="text-align: center; color: #64748b;">Fetching matches...</p>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBrHcONT6y0he3fzrtRGqdQMZfIMpGxcNo",
        authDomain: "kl-esports.firebaseapp.com",
        databaseURL: "https://kl-esports-default-rtdb.firebaseio.com",
        projectId: "kl-esports",
        storageBucket: "kl-esports.appspot.com",
        messagingSenderId: "440301376580",
        appId: "1:440301376580:web:fb0b8ae0df3fe096bd1811"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Default to Today's Date
    document.getElementById('demoDateFilter').valueAsDate = new Date();

    function generateUltraRealBot() {
        const tags3 = ["PRZ", "RST", "JIS", "TWI", "MAX", "SKY", "ACE", "PRO", "REX", "ZOD", "KLM", "TNT"];
        const tags2 = ["SP", "TK", "LM", "X7", "OP", "DX", "GG", "MR", "YT", "Z1", "KL", "TN"];
        const names = ["JACK", "YUVARAJ", "TV", "TWISST", "KIRAN", "RAHUL", "VIJAY", "ARJUN", "SREE", "GHOST", "ZOD", "SNIPER", "KING", "BOY", "EAGLE", "HUNTER", "VIGNESH", "HARI", "AKSHAY", "DRACO", "BLADE", "WARRIOR", "NITHIN", "JITHIN", "ABHI", "SURYA", "RAVAN", "ZACK", "LEO", "REX", "TYSON", "LUKE", "KABIR", "SAURAV", "AJITH"];
        const style = Math.random(); 
        let finalIGN = "";
        const randomName = names[Math.floor(Math.random() * names.length)];
        if (style < 0.35) finalIGN = tags3[Math.floor(Math.random() * tags3.length)] + " " + randomName;
        else if (style < 0.70) finalIGN = tags2[Math.floor(Math.random() * tags2.length)] + " " + randomName;
        else finalIGN = randomName + (Math.random() > 0.5 ? " " + Math.floor(10 + Math.random() * 99) : " M");

        return { ign: finalIGN, photo: 'https://cdn-icons-png.flaticon.com/512/149/149071.png' };
    }

    function loadMatches() {
        const filterDate = document.getElementById('demoDateFilter').value;
        const listDiv = document.getElementById('demoMatchList');
        
        db.ref('matches').on('value', snap => {
            listDiv.innerHTML = "";
            let matchCount = 0;

            if(!snap.exists()) { listDiv.innerHTML = "<p style='text-align:center'>No active matches found.</p>"; return; }

            snap.forEach(child => {
                const m = child.val();
                if(m.status === "Completed") return;

                // Check if match date matches filter date
                if(m.time && m.time.startsWith(filterDate)) {
                    matchCount++;
                    const mDate = new Date(m.time);
                    const timeStr = mDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    const dateStr = mDate.toLocaleDateString();

                    const card = document.createElement('div');
                    card.className = 'match-card';
                    card.innerHTML = `
                        <div class="m-title">${m.category} | ${m.map || 'ERANGEL'}</div>
                        <div class="m-time-info"><i class="fa-regular fa-clock"></i> ${timeStr} | <i class="fa-regular fa-calendar"></i> ${dateStr}</div>
                        <div class="m-stats">
                            <span>Joined: <b>${m.joined || 0} / ${m.max || 48}</b></span>
                            <span>Fee: ₹${m.entry}</span>
                        </div>
                        <div class="controls">
                            <input type="number" id="qty-${child.key}" placeholder="Bots?">
                            <button class="btn-add" onclick="addBots('${child.key}', ${m.joined || 0}, ${m.max || 48})">ADD</button>
                        </div>
                    `;
                    listDiv.appendChild(card);
                }
            });

            if(matchCount === 0) {
                listDiv.innerHTML = "<p style='text-align:center; color:#64748b;'>No matches found for this date.</p>";
            }
        });
    }

    async function addBots(matchId, currentJoined, maxSlots) {
        const input = document.getElementById('qty-' + matchId);
        const qty = parseInt(input.value);
        if(!qty || qty <= 0) return alert("Enter a number!");
        if(currentJoined + qty > maxSlots) return alert("Limit Exceeded!");

        const participantsRef = db.ref('matches/' + matchId + '/participants');
        for (let i = 0; i < qty; i++) {
            const bot = generateUltraRealBot();
            participantsRef.push({
                playerName: bot.ign,
                profilePic: bot.photo,
                status: "Confirmed",
                type: "Demo_Bot",
                uid: "BOT_" + Math.random().toString(36).substr(2, 9).toUpperCase()
            });
        }
        await db.ref('matches/' + matchId).update({ joined: currentJoined + qty });
        alert(qty + " Bots added!");
        input.value = "";
    }

    loadMatches();
</script>
</body>
</html>
